name: Deploy Nasdaq Proxy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-nasdaq-proxy.yml"
      - "serverless/cloudflare-nasdaq-proxy/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Cloudflare secrets
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: c1659ca937b3ddd76e08a250c40dfcda
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Missing Cloudflare API token. Set CLOUDFLARE_API_TOKEN in repository secrets."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::Missing Cloudflare account id. Set CLOUDFLARE_ACCOUNT_ID in repository secrets."
            exit 1
          fi

      - name: Resolve Cloudflare credentials
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: c1659ca937b3ddd76e08a250c40dfcda
        run: |
          set +e
          token="${CF_API_TOKEN}"
          account="${CF_ACCOUNT_ID}"

          echo "CLOUDFLARE_API_TOKEN=$token" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$account" >> "$GITHUB_ENV"

          # Token verification is informative only. Some scopes can deploy but fail list/read probes.
          verify_response=$(curl -sS -H "Authorization: Bearer $token" "https://api.cloudflare.com/client/v4/user/tokens/verify")
          if ! echo "$verify_response" | grep -q '"success":true'; then
            echo "::warning::Cloudflare token verify did not return success=true; deployment step will provide authoritative error details."
          fi

      - name: Cloudflare preflight (account + workers access)
        env:
          CF_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          verify_response=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" "https://api.cloudflare.com/client/v4/user/tokens/verify")
          if ! echo "$verify_response" | grep -q '"success":true'; then
            echo "::warning::Cloudflare token verify did not return success=true; proceeding to account/workers access check."
            echo "$verify_response"
          fi

          workers_response=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts")
          if ! echo "$workers_response" | grep -q '"success":true'; then
            echo "::error::Token cannot access account workers scripts. Check CLOUDFLARE_ACCOUNT_ID and token account scope."
            echo "$workers_response"
            exit 1
          fi

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: serverless/cloudflare-nasdaq-proxy
          command: deploy --config wrangler.toml --non-interactive
