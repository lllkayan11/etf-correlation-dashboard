name: Deploy Nasdaq Proxy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-nasdaq-proxy.yml"
      - "serverless/cloudflare-nasdaq-proxy/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Cloudflare secrets
        env:
          CF_API_TOKEN_PRIMARY: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN_FALLBACK: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID_PRIMARY: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCOUNT_ID_FALLBACK: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_API_TOKEN_PRIMARY" ] && [ -z "$CF_API_TOKEN_FALLBACK" ]; then
            echo "::error::Missing Cloudflare API token. Set CLOUDFLARE_API_TOKEN (or CF_API_TOKEN) in repository secrets."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID_PRIMARY" ] && [ -z "$CF_ACCOUNT_ID_FALLBACK" ]; then
            echo "::error::Missing Cloudflare account id. Set CLOUDFLARE_ACCOUNT_ID (or CF_ACCOUNT_ID) in repository secrets."
            exit 1
          fi

      - name: Resolve Cloudflare credentials
        env:
          CF_API_TOKEN_PRIMARY: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN_FALLBACK: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID_PRIMARY: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCOUNT_ID_FALLBACK: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set +e
          token="${CF_API_TOKEN_PRIMARY:-$CF_API_TOKEN_FALLBACK}"
          account="${CF_ACCOUNT_ID_PRIMARY:-$CF_ACCOUNT_ID_FALLBACK}"

          echo "CLOUDFLARE_API_TOKEN=$token" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$account" >> "$GITHUB_ENV"

          # Token verification is informative only. Some scopes can deploy but fail list/read probes.
          verify_response=$(curl -sS -H "Authorization: Bearer $token" "https://api.cloudflare.com/client/v4/user/tokens/verify")
          if ! echo "$verify_response" | grep -q '"success":true'; then
            echo "::warning::Cloudflare token verify did not return success=true; deployment step will provide authoritative error details."
          fi

      - name: Deploy Worker
        working-directory: serverless/cloudflare-nasdaq-proxy
        env:
          WRANGLER_LOG: debug
        run: |
          npm i -g wrangler@4
          wrangler deploy --config wrangler.toml --non-interactive
