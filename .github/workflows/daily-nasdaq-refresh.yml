name: Daily Nasdaq Refresh

on:
  schedule:
    # 06:00 Beijing time on Monday-Friday = 22:00 UTC on Sunday-Thursday
    - cron: "0 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dukpy pandas_market_calendars

      - name: Check US market trading day
        id: market_day
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import pandas_market_calendars as mcal

          today_et = datetime.now(ZoneInfo("America/New_York")).date()
          cal = mcal.get_calendar("NYSE")
          sched = cal.schedule(start_date=str(today_et), end_date=str(today_et))
          is_trading_day = not sched.empty

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as f:
            f.write(f"run_refresh={'true' if is_trading_day else 'false'}\n")
            f.write(f"today_et={today_et}\n")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
            with open(summary_path, "a", encoding="utf-8") as f:
              f.write("## Trading Day Gate\n")
              f.write(f"- Date (ET): `{today_et}`\n")
              f.write(f"- NYSE trading day: `{'YES' if is_trading_day else 'NO'}`\n")
              if not is_trading_day:
                f.write("- Refresh steps are skipped (weekend/public holiday).\n")
          PY

      - name: Refresh Nasdaq data
        if: steps.market_day.outputs.run_refresh == 'true'
        run: python fetch_etf_data.py

      - name: Refresh Nasdaq symbol lookup
        if: steps.market_day.outputs.run_refresh == 'true'
        run: python fetch_nasdaq_symbol_lookup.py

      - name: Rebuild compiled bundle
        if: steps.market_day.outputs.run_refresh == 'true'
        run: python compile_jsx.py

      - name: Verify Nasdaq data integrity
        if: steps.market_day.outputs.run_refresh == 'true'
        run: python verify_nasdaq_data.py

      - name: Publish refresh summary
        if: steps.market_day.outputs.run_refresh == 'true'
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("daily_refresh_summary.json")
          if not summary_path.exists():
            print("Summary file not found.")
            raise SystemExit(1)

          data = json.loads(summary_path.read_text(encoding="utf-8"))
          out = os.environ.get("GITHUB_STEP_SUMMARY")
          if not out:
            raise SystemExit("GITHUB_STEP_SUMMARY is missing")

          lines = []
          lines.append("## Daily Nasdaq Refresh Summary")
          lines.append(f"- Run (UTC): `{data.get('run_utc', 'N/A')}`")
          lines.append(f"- Latest Trading Date: `{data.get('latest_trading_date', 'N/A')}`")
          lines.append("")
          lines.append("| Ticker | Latest Date | Latest Close | Status |")
          lines.append("|---|---|---:|---|")
          for row in data.get("tickers", []):
            close = row.get("latest_close")
            close_text = f\"{close:.2f}\" if isinstance(close, (int, float)) else "N/A"
            lines.append(
              f"| {row.get('ticker','')} | {row.get('latest_date','N/A')} | {close_text} | {row.get('status','')} |"
            )

          anomalies = data.get("anomalies", [])
          lines.append("")
          if anomalies:
            lines.append("### Anomalies")
            for item in anomalies:
              lines.append(f"- {item}")
          else:
            lines.append("### Anomalies")
            lines.append("- None")

          Path(out).write_text("\\n".join(lines) + "\\n", encoding="utf-8")
          PY

      - name: Commit and push if changed
        if: steps.market_day.outputs.run_refresh == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add etf_daily_data_nasdaq.json nasdaq_symbol_lookup.json daily_refresh_summary.json nasdaq_data_verification_report.json app.compiled.js app.compiled.v2.js
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: daily Nasdaq refresh"
          git push
