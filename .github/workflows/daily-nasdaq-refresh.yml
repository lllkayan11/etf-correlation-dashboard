name: Daily Nasdaq Refresh

on:
  schedule:
    # 06:00 Beijing time = 22:00 UTC (previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dukpy

      - name: Refresh Nasdaq data
        run: python fetch_etf_data.py

      - name: Rebuild compiled bundle
        run: python compile_jsx.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add etf_daily_data_nasdaq.json app.compiled.js
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: daily Nasdaq refresh"
          git push
